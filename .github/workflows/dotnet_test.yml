---
name: dotnet test

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]
  workflow_dispatch:

env:
  SLN: back/ExamPaper.slnx
  TYPE_BUILD: Release
  VERBOSITY: normal

jobs:
  check-format:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    concurrency:
      group: format-${{ github.ref }}
      cancel-in-progress: true

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Setup environment
        uses: ./.github/actions/setup-dotnet-env
        with:
          restore: 'true'

      - name: Verify formatting
        run: dotnet format $SLN --verify-no-changes --no-restore

  test:
    needs: check-format
    runs-on: ubuntu-latest
    concurrency:
      group: test-${{ github.ref }}
      cancel-in-progress: true

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Setup environment
        uses: ./.github/actions/setup-dotnet-env
        with:
          restore: 'true'

      - name: Build
        run: dotnet build $SLN --no-restore --configuration $TYPE_BUILD

      - name: Test
        run: >
          dotnet test $SLN --no-build --configuration $TYPE_BUILD
          --verbosity $VERBOSITY