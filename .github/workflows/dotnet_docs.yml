name: dotnet docs
on:
  push:
    branches: [develop]
  workflow_dispatch: 

jobs:
  publish-docs:
    runs-on: ubuntu-latest
    steps:
    - name: Check out code
      uses: actions/checkout@v6 

    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: 10.0.x

    - name: Install DocFX
      run: dotnet tool update -g docfx


    - name: Disable Jekyll
      run: touch ./_site/.nojekyll || mkdir -p _site && touch _site/.nojekyll

    - name: Build Docs
      run: docfx docfx.json

    - name: Deploy to GitHub Pages
      uses: peaceiris/actions-gh-pages@v3
      with:
        github_token: ${{ secrets.GITHUB_TOKEN }}
        publish_dir: ./_site
        force_ orphan: true 

permissions:
  contents: write
