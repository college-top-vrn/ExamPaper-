  assemblies:
  - ExamPaper.Service
  namespace: ExamPaper.Service.Generator
  summary: Генерирует коллекцию экзаменационных билетов на основе доступных вопросов и настроек генерации.
  remarks: >-
    Вопросы для каждого билета выбираются случайным образом без повторений в пределах одного билета.

    Один и тот же вопрос может встречаться в разных билетах.
  example: []
  syntax:
    content: public IEnumerable<IExamPaper> Generate(IEnumerable<IQuestion> availableQuestions, IGenerationSettings settings)
    parameters:
    - id: availableQuestions
      type: System.Collections.Generic.IEnumerable{ExamPaper.Core.Interfaces.IQuestion}
      description: Коллекция доступных вопросов для составления билетов.
    - id: settings
      type: ExamPaper.Core.Generation.IGenerationSettings
      description: Настройки генерации, определяющие количество билетов и вопросов в каждом билете.
    return:
      type: System.Collections.Generic.IEnumerable{ExamPaper.Core.Interfaces.IExamPaper}
      description: Коллекция сгенерированных экзаменационных билетов.
    content.vb: Public Function Generate(availableQuestions As IEnumerable(Of IQuestion), settings As IGenerationSettings) As IEnumerable(Of IExamPaper)
  overload: ExamPaper.Service.Generator.ExamPaperGenerator.Generate*
  exceptions:
  - type: System.ArgumentNullException
    commentId: T:System.ArgumentNullException
    description: Выбрасывается, если <code class="paramref">availableQuestions</code> или <code class="paramref">settings</code> равны null.
  - type: System.InvalidOperationException
    commentId: T:System.InvalidOperationException
    description: Выбрасывается, если количество доступных вопросов меньше, чем <xref href="ExamPaper.Core.Generation.IGenerationSettings.QuestionsPerTicketCount" data-throw-if-not-resolved="false"></xref>.
