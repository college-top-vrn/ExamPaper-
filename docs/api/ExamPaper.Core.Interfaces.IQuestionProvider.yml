    content: IEnumerable<IQuestion> GetAllQuestions()
    return:
      type: System.Collections.Generic.IEnumerable{ExamPaper.Core.Interfaces.IQuestion}
      description: >-
        Перечисление объектов, реализующих <xref href="ExamPaper.Core.Interfaces.IQuestion" data-throw-if-not-resolved="false"></xref>.

        Если вопросы отсутствуют, возвращает пустую коллекцию.
