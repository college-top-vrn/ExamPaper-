  assemblies:
  - ExamPaper.Infrastructure
  namespace: ExamPaper.Infrastructure.Repositories
  summary: Реализация провайдера вопросов для загрузки данных из файла в формате JSON.
  remarks: >-
    <p>
        <xref href="ExamPaper.Infrastructure.Repositories.QuestionRepository" data-throw-if-not-resolved="false"></xref> предоставляет функциональность для работы с коллекцией вопросов,
        хранящихся в JSON-файле. Репозиторий поддерживает CRUD операции, загрузку и сохранение данных.
    </p>

    <p>
        Все изменения в коллекции вопросов накапливаются в памяти и сохраняются в файл только при вызове
        метода <xref href="ExamPaper.Infrastructure.Repositories.QuestionRepository.SaveChanges" data-throw-if-not-resolved="false"></xref>.
    </p>

    <p>
        <b>Пример использования:</b>
        <pre><code class="lang-csharp">var repository = new QuestionRepository("questions.json");

    // Получение всех вопросов

    var allQuestions = repository.GetAllQuestions();


    // Добавление нового вопроса

    var newQuestion = new Question { Id = Guid.NewGuid(), Text = "Что такое SOLID?" };

    repository.AddQuestion(newQuestion);


    // Сохранение изменений

    repository.SaveChanges();</code></pre>

    </p>
  example: []
  syntax:
    content: 'public sealed class QuestionRepository : IQuestionRepository, IQuestionProvider, IQuestionModifier'
