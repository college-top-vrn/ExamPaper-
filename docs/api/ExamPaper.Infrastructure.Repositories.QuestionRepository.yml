  summary: Удаляет вопрос по указанному идентификатору.
  remarks: >-
    <p>
        Если вопрос с указанным <code class="paramref">questionId</code> не найден, метод не выполняет никаких действий
        и не выбрасывает исключение.
    </p>

    <p>
        Вопрос удаляется только из памяти. Для сохранения изменений в файл необходимо вызвать
        метод <xref href="ExamPaper.Infrastructure.Repositories.QuestionRepository.SaveChanges" data-throw-if-not-resolved="false"></xref>.
    </p>
