  assemblies:
  - ExamPaper.Core
  namespace: ExamPaper.Core.Interfaces
  summary: Формирует коллекцию экзаменационных билетов на основе предоставленного пула вопросов и заданных правил.
  example: []
  syntax:
    content: IEnumerable<IExamPaper> Generate(IEnumerable<IQuestion> availableQuestions, IGenerationSettings settings)
    parameters:
    - id: availableQuestions
      type: System.Collections.Generic.IEnumerable{ExamPaper.Core.Interfaces.IQuestion}
      description: Пул доступных вопросов, из которых будет производиться выборка.
    - id: settings
      type: ExamPaper.Core.Generation.IGenerationSettings
      description: Объект конфигурации, определяющий параметры генерации (количество билетов, вопросов и т.д.).
    return:
      type: System.Collections.Generic.IEnumerable{ExamPaper.Core.Interfaces.IExamPaper}
      description: Коллекция объектов, реализующих <xref href="ExamPaper.Core.Interfaces.IExamPaper" data-throw-if-not-resolved="false"></xref>, готовых к дальнейшей обработке или экспорту.
    content.vb: Function Generate(availableQuestions As IEnumerable(Of IQuestion), settings As IGenerationSettings) As IEnumerable(Of IExamPaper)
  overload: ExamPaper.Core.Interfaces.IExamGenerator.Generate*
  exceptions:
  - type: System.ArgumentNullException
    commentId: T:System.ArgumentNullException
    description: Выбрасывается, если <code class="paramref">availableQuestions</code> или <code class="paramref">settings</code> имеют значение null.
  - type: System.InvalidOperationException
    commentId: T:System.InvalidOperationException
    description: Выбрасывается, если количество доступных вопросов недостаточно для выполнения условий генерации.
